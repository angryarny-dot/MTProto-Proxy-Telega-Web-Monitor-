<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTProto Monitor Icon Pro</title>
    <style>
        :root {
            --apple-blue: #0A84FF;
            --apple-green: #30D158;
            --apple-yellow: #FFD60A;
            --card-gray: #1C1C1E; 
            --bg-black: #000000;  
            --text-gray: #8E8E93;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-black);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; position: relative; }

        header {
            padding: 16px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid #2C2C2E;
            display: flex; justify-content: space-between; align-items: center;
        }

        h1 { margin: 0; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }

        /* Крупная кнопка обновления */
        .refresh-btn { 
            width: 40px; height: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--apple-blue);
            transition: background 0.2s, transform 0.1s;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.15); }
        .refresh-btn:active { transform: scale(0.95); }
        .refresh-btn svg { width: 22px; height: 22px; }

        .list { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        
        .card {
            background: var(--card-gray); border-radius: 20px; padding: 16px;
            display: flex; justify-content: space-between; align-items: center;
            border: 0.5px solid #38383A;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .info { flex: 1; min-width: 0; margin-right: 12px; }
        .server-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff; }
        .server-meta { font-size: 13px; color: var(--text-gray); display: flex; align-items: center; gap: 8px; }

        .ping-val { font-weight: 800; font-size: 12px; padding: 2px 6px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .fast { color: var(--apple-green); }
        .slow { color: var(--apple-yellow); }

        .actions { display: flex; gap: 10px; align-items: center; }
        
        /* Кнопки действий (иконки) */
        .icon-btn { 
            width: 42px; height: 42px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s, transform 0.1s;
        }
        .icon-btn:active { transform: scale(0.92); opacity: 0.8; }
        .icon-btn svg { width: 20px; height: 20px; }

        .btn-set { background: var(--apple-blue); color: #fff; }
        .btn-copy { background: #2C2C2E; color: #fff; border: 0.5px solid #38383A; }

        #progress-line { height: 2px; background: var(--apple-blue); width: 0%; position: fixed; top: 72px; z-index: 101; transition: width 0.2s; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: rotate 1s linear infinite; }
    </style>
</head>
<body>

<div id="progress-line"></div>

<div class="container">
    <header>
        <h1>Proxy Web</h1>
        <button class="refresh-btn" id="refreshBtn" title="Обновить и пинговать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"></path>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        </button>
    </header>

    <div id="mainList" class="list">
        <div style="text-align:center; color:var(--text-gray); padding:40px; font-size:14px;">Нажмите ↻ для загрузки</div>
    </div>
</div>

<script>
    // SVG Иконки для кнопок в списке
    const ICON_PLANE = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M1.946 9.315c-.522.174-.527.455.01.634l2.887.969 1.921 5.43c.21.595.576.667.818.167l1.39-2.83 4.626 4.625c.415.415 1.091.146 1.091-.437V15.25l4.637-4.637 4.674 4.674c.415.415 1.091.146 1.091-.437V1.102c0-.584-.638-.897-1.091-.438L1.946 9.315Z"></path></svg>`;
    const ICON_COPY = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
    const ICON_CHECK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

    const GITHUB_URL = "https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt";
    let proxies = [];

    async function load() {
        const list = document.getElementById('mainList');
        const bar = document.getElementById('progress-line');
        const refreshBtn = document.getElementById('refreshBtn');
        
        refreshBtn.classList.add('rotating'); // Анимация вращения
        
        try {
            const r = await fetch(GITHUB_URL + "?t=" + Date.now());
            const text = await r.text();
            
            proxies = text.split('\n').filter(l => l.includes('proxy?')).map(line => {
                const p = new URLSearchParams(line.split('?')[1]);
                return {
                    host: p.get('server'),
                    port: p.get('port'),
                    full: line.trim(),
                    ping: null
                };
            });

            render();

            // Пинг через HTTPS
            for (let i = 0; i < proxies.length; i++) {
                const p = proxies[i];
                const start = Date.now();
                
                try {
                    const ctrl = new AbortController();
                    const timeout = setTimeout(() => ctrl.abort(), 1600);
                    await fetch(`https://${p.host}:${p.port}`, { mode: 'no-cors', signal: ctrl.signal });
                    clearTimeout(timeout);
                    p.ping = Date.now() - start;
                } catch (e) {
                    p.ping = (Date.now() - start > 1500) ? 999 : (Date.now() - start);
                }

                bar.style.width = ((i + 1) / proxies.length * 100) + "%";
                if (i % 2 === 0 || i === proxies.length - 1) render();
            }
            
            setTimeout(() => bar.style.width = "0%", 1000);
        } catch (e) {
            list.innerHTML = "<div style='text-align:center; color:red; padding:20px;'>Ошибка сети</div>";
        } finally {
            refreshBtn.classList.remove('rotating'); // Стоп анимация
        }
    }

    function render() {
        const main = document.getElementById('mainList');
        
        // Сортировка по пингу
        const sorted = [...proxies].sort((a, b) => {
            if (a.ping === null) return 1;
            if (b.ping === null) return -1;
            return a.ping - b.ping;
        });

        main.innerHTML = sorted.map(p => `
            <div class="card">
                <div class="info">
                    <div class="server-name">🛡️ ${p.host}</div>
                    <div class="server-meta">
                        <span class="ping-val ${p.ping && p.ping < 400 ? 'fast' : 'slow'}">
                            ${p.ping ? p.ping + ' ms' : '...'}
                        </span>
                        <span>• Port: ${p.port}</span>
                    </div>
                </div>
                <div class="actions">
                    <button class="icon-btn btn-copy" onclick="copyAddr('${p.full}', this)" title="Копировать адрес">
                        ${ICON_COPY}
                    </button>
                    <button class="icon-btn btn-set" onclick="window.open('${p.full.replace('tg://', 'https://t.me/')}', '_blank')" title="Подключить">
                        ${ICON_PLANE}
                    </button>
                </div>
            </div>
        `).join('');
    }

    function copyAddr(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            btn.innerHTML = ICON_CHECK; // Галочка
            btn.style.color = "var(--apple-green)";
            btn.style.borderColor = "var(--apple-green)";
            setTimeout(() => {
                btn.innerHTML = ICON_COPY; // Вернуть иконку копирования
                btn.style.color = "#fff";
                btn.style.borderColor = "#38383A";
            }, 1000);
        });
    }

    document.getElementById('refreshBtn').onclick = load;
    // Автозагрузка при старте
    load();
</script>
</body>
</html>
