<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTProto Monitor</title>
    <style>
        :root {
            --apple-blue: #0A84FF;
            --apple-green: #30D158;
            --apple-yellow: #FFD60A;
            --apple-red: #FF453A;
            --card-gray: #1C1C1E; 
            --bg-black: #000000;  
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-black);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; }

        header {
            padding: 16px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid #2C2C2E;
            display: flex; justify-content: space-between; align-items: center;
        }

        h1 { margin: 0; font-size: 19px; font-weight: 800; color: var(--apple-blue); }

        .refresh-btn { color: var(--apple-blue); cursor: pointer; font-weight: 600; font-size: 14px; border:none; background:none; outline:none; }

        .section-title { padding: 20px 16px 10px; font-size: 11px; font-weight: 700; color: #8E8E93; text-transform: uppercase; letter-spacing: 1px; }

        .list { padding: 0 16px 40px; display: flex; flex-direction: column; gap: 10px; }
        
        .card {
            background: var(--card-gray); border-radius: 20px; padding: 16px;
            display: flex; justify-content: space-between; align-items: center;
            border: 0.5px solid #38383A;
        }

        .info { flex: 1; min-width: 0; }
        .server-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .server-meta { font-size: 12px; color: #8E8E93; display: flex; align-items: center; gap: 6px; }

        .btn { border: none; border-radius: 14px; padding: 8px 16px; font-weight: 700; cursor: pointer; font-size: 13px; background: var(--apple-blue); color: #fff; }
        .btn-copy { background: #3A3A3C; margin-right: 8px; }

        #status-msg { text-align: center; padding: 20px; color: #8E8E93; font-size: 14px; }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .online { background: var(--apple-green); box-shadow: 0 0 8px var(--apple-green); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MTProto Web</h1>
        <button class="refresh-btn" id="refreshBtn">Обновить</button>
    </header>

    <div class="section-title">Список прокси (GitHub)</div>
    <div id="status-msg">Загрузка данных...</div>
    <div id="mainList" class="list"></div>
</div>

<script>
    const DATA_URL = "https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt";
    // Резервные прокси для обхода CORS, если прямой запрос не пройдет
    const PROXY_HELPERS = [
        "", // Сначала пробуем напрямую
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?"
    ];

    async function loadData(attempt = 0) {
        const msg = document.getElementById('status-msg');
        const list = document.getElementById('mainList');
        
        if (attempt === 0) {
            list.innerHTML = "";
            msg.style.display = "block";
            msg.innerText = "Подключение к репозиторию...";
        }

        try {
            const finalUrl = PROXY_HELPERS[attempt] + encodeURIComponent(DATA_URL + "?t=" + Date.now());
            // Если attempt 0, используем прямую ссылку без encode
            const fetchUrl = attempt === 0 ? DATA_URL + "?t=" + Date.now() : finalUrl;

            const res = await fetch(fetchUrl);
            if (!res.ok) throw new Error("Fetch failed");
            
            const text = await res.text();
            const lines = text.split('\n').filter(l => l.includes('proxy?'));

            if (lines.length === 0) throw new Error("No proxies found");

            msg.style.display = "none";
            render(lines);

        } catch (e) {
            console.error(`Попытка ${attempt} не удалась`, e);
            if (attempt < PROXY_HELPERS.length - 1) {
                loadData(attempt + 1);
            } else {
                msg.innerText = "Ошибка загрузки. Проверьте интернет или GitHub.";
            }
        }
    }

    function render(lines) {
        const list = document.getElementById('mainList');
        list.innerHTML = "";

        lines.forEach(line => {
            const urlParams = new URLSearchParams(line.split('?')[1]);
            const server = urlParams.get('server');
            const port = urlParams.get('port');
            
            if (!server) return;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <div class="server-name">🛡️ ${server}</div>
                    <div class="server-meta">
                        <span class="dot online"></span>
                        Порт: ${port} • MTProto
                    </div>
                </div>
                <div style="display:flex;">
                    <button class="btn btn-copy" onclick="copyToClipboard('${line.trim()}', this)">📋</button>
                    <button class="btn" onclick="window.open('${line.trim().replace('tg://', 'https://t.me/')}', '_blank')">Set</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const old = btn.innerText;
            btn.innerText = "✅";
            setTimeout(() => btn.innerText = old, 1000);
        });
    }

    document.getElementById('refreshBtn').onclick = () => loadData(0);
    
    // Запуск
    loadData(0);
</script>
</body>
</html>
