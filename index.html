<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTProto Gold Monitor</title>
    <style>
        :root {
            --apple-blue: #0A84FF;
            --apple-green: #30D158;
            --apple-yellow: #FFD60A;
            --apple-red: #FF453A;
            --card-gray: #1C1C1E; 
            --bg-black: #000000;  
            --text-gray: #8E8E93;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-black);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 80px; }

        header {
            padding: 16px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid #2C2C2E;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 6px;
        }

        .header-note {
            width: 100%;
            font-size: 12px;
            color: var(--apple-yellow);
            font-weight: 700;
        }

        .nav-right { display: flex; gap: 8px; align-items: center; }

        #loadingNote {
            display: none; background: #1C1C1E; padding: 10px 16px;
            border-bottom: 0.5px solid #2C2C2E; font-size: 12px;
            color: var(--text-gray); text-align: center;
        }

        .list { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: var(--card-gray); border-radius: 20px; padding: 14px;
            display: flex; justify-content: space-between; align-items: center;
            border: 0.5px solid #38383A;
        }
        .info { flex: 1; min-width: 0; margin-right: 8px; }
        .server-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .server-name span { text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .server-meta { font-size: 12px; color: var(--text-gray); display: flex; align-items: center; gap: 6px; }
        .ping-val { font-weight: 800; font-size: 10px; padding: 2px 6px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .fast { color: var(--apple-green); }
        .slow { color: var(--apple-yellow); }
        .dead { color: var(--apple-red); }

        .actions { display: flex; gap: 6px; }
        .icon-btn { 
            width: 36px; height: 36px; border-radius: 10px; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .header-icon {
            background: rgba(255,255,255,0.08); border-radius: 50%; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; border: none; text-decoration: none;
        }
        
        .btn-fav { background: #2C2C2E; color: #8E8E93; border: 0.5px solid #38383A; }
        .btn-fav.active { color: var(--apple-yellow); }
        .btn-copy { background: #2C2C2E; color: #fff; border: 0.5px solid #38383A; }
        .btn-set { background: var(--apple-blue); color: #fff; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: rotate 1s linear infinite; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { 
            background: #1C1C1E; width: 85%; max-width: 380px; padding: 25px; 
            border-radius: 28px; border: 0.5px solid #38383A; text-align: center;
        }
        .modal-btn-main { background: var(--apple-blue); color: #fff; text-decoration: none; padding: 14px; border-radius: 14px; display: block; font-weight: 700; margin-top: 20px; font-size: 16px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="font-size: 18px; margin: 0; letter-spacing: -0.5px;">MTProto Gold</h1>
            <div style="color: var(--text-gray); font-size: 11px; margin-top: 2px;">Список обновлен через Render API</div>
        </div>
        <div class="nav-right">
            <button class="header-icon" id="refreshBtn">
                <svg id="refreshSvg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            </button>
        </div>
        <div id="statusNote" class="header-note">Ожидание...</div>
    </header>

    <div id="loadingNote">Загрузка кэша...</div>

    <div id="favoriteSection" style="display:none;">
        <div class="section-label" style="color:var(--apple-yellow); padding: 16px;">⭐ Избранное</div>
        <div id="favoriteList" class="list"></div>
    </div>

    <div class="section-label" style="padding: 16px; color: var(--text-gray); font-size: 11px;">ВСЕ ПРОКСИ</div>
    <div id="mainList" class="list"></div>
</div>

<div id="connectModal" class="modal">
    <div class="modal-content">
        <h2 style="margin: 0; font-size: 20px;">Подключение</h2>
        <p style="color: var(--text-gray); font-size: 14px; margin-top: 8px;">Перейти в Telegram для установки прокси?</p>
        <a href="#" id="finalConnectBtn" class="modal-btn-main" onclick="closeModal('connectModal')">Подключить</a>
        <button onclick="closeModal('connectModal')" style="background:none; border:none; color:var(--text-gray); margin-top:20px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script>
    const API_URL = "https://mtproto-ping.onrender.com/ping";
    let proxies = [];
    let favorites = JSON.parse(localStorage.getItem('userFavs') || '[]');

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // ГЛАВНАЯ ФУНКЦИЯ - ТЕПЕРЬ БЕЗ ЦИКЛОВ И ЛИШНИХ FETCH
    async function load() {
        const svg = document.getElementById('refreshSvg');
        const note = document.getElementById('loadingNote');
        const status = document.getElementById('statusNote');
        
        if (svg.classList.contains('rotating')) return;
        
        svg.classList.add('rotating');
        note.style.display = 'block';
        status.innerText = "Запрос к Render...";

        try {
            const r = await fetch(API_URL);
            if (!r.ok) throw new Error("Ошибка сервера");
            
            // Получаем JSON. ВАЖНО: твой бэкенд возвращает список объектов с 'ping' и 'alive'
            proxies = await r.json();

            status.innerText = `Живых: ${proxies.filter(p => p.alive).length} (из кэша)`;
        } catch (e) {
            status.innerText = "Ошибка API. Проверь бэкенд.";
            console.error(e);
        } finally {
            svg.classList.remove('rotating');
            note.style.display = 'none';
            render();
        }
    }

    function render() {
        // Рендерим основной список
        const listHtml = proxies.map(p => {
            const dot = p.alive ? (p.ping < 500 ? '🟢' : '🟡') : '🔴';
            const pClass = p.alive ? (p.ping < 500 ? 'fast' : 'slow') : 'dead';
            return `
                <div class="card" style="${!p.alive ? 'opacity: 0.4' : ''}">
                    <div class="info">
                        <div class="server-name">${dot} 🌐 <span>${p.host}</span></div>
                        <div class="server-meta">
                            <span class="ping-val ${pClass}">${p.alive ? p.ping + ' ms' : 'off'}</span>
                            <span>• ${p.port}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="icon-btn btn-set" onclick="connect('${p.full}')">🔗</button>
                    </div>
                </div>`;
        }).join('');
        
        document.getElementById('mainList').innerHTML = listHtml;
    }

    function connect(url) {
        const btn = document.getElementById('finalConnectBtn');
        btn.href = url.replace('tg://', 'https://t.me/');
        openModal('connectModal');
    }

    window.onload = load;
    document.getElementById('refreshBtn').onclick = load;
</script>
</body>
</html>
